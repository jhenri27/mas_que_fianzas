<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizaciones - MAS QUE FIANZAS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF + AutoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <!-- SheetJS para Excel/CSV -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <!-- JSZip para ZIP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- Logo MQF en Base64 (necesario para PDFs) -->
  <script src="../assets/logo_b64.js"></script>
  <!-- Motor de exportación con dibujarCotizacionPDF() -->
  <script src="../assets/data-export.js"></script>
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f6fb; }
    .cot-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); padding: 20px 28px 10px; }
    .cot-header h1 { color: #fff; font-size: 22px; font-weight: 700; margin: 0 0 4px; }
    .cot-header p { color: rgba(255,255,255,0.75); font-size: 13px; margin: 0 0 16px; }
    .cot-tabs { display: flex; gap: 4px; }
    .cot-tab { padding: 10px 22px; border: none; cursor: pointer; border-radius: 10px 10px 0 0; font-size: 14px; font-weight: 600; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
    .cot-tab:hover { background: rgba(255,255,255,0.25); color: #fff; }
    .cot-tab.active { background: #fff; color: #4f46e5; }
    .cot-panel { display: none; padding: 24px; }
    .cot-panel.active { display: block; }
    .section-card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 15px; font-weight: 700; color: #1e1b4b; margin: 0 0 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
    .fianza-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group.full { grid-column: 1 / -1; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 11px 24px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #4338ca; }
    .result-card { background: linear-gradient(135deg, #eef2ff, #f5f3ff); border: 1.5px solid #c7d2fe; border-radius: 12px; padding: 20px; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e0e7ff; }
    .result-row .label { color: #6b7280; }
    .result-row .value { font-weight: 600; color: #1e1b4b; }
    .result-row .amount { font-size: 20px; font-weight: 700; color: #4f46e5; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5f3ff; padding: 10px; text-align: left; color: #4338ca; font-weight: 600; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    /* Historial toolbar */
    .hist-toolbar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    .btn-export-main { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; background:#4f46e5; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-export-main:hover { background:#4338ca; }
    .btn-import-main { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; background:#0d9488; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-import-main:hover { background:#0f766e; }
    .dropdown-export { position:relative; display:inline-block; }
    .export-menu { display:none; position:absolute; top:100%; left:0; background:#fff; border:1.5px solid #e5e7eb; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.12); z-index:100; min-width:180px; padding:6px 0; }
    .export-menu button { display:block; width:100%; text-align:left; padding:9px 16px; border:none; background:none; cursor:pointer; font-size:13px; color:#374151; }
    .export-menu button:hover { background:#f5f3ff; color:#4f46e5; }
    .btn-print-row { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; background:#1e40af; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; }
    .btn-print-row:hover { background:#1d4ed8; }
    .btn-edit-row { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; background:#f59e0b; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; margin-right:5px; }
    .btn-edit-row:hover { background:#d97706; }
    .hist-count { font-size:13px; color:#6b7280; margin-left:auto; }
  </style>
</head>
<body>
  <div class="cot-header">
    <h1><i class="fa-solid fa-chart-line"></i> Módulo de Cotizaciones</h1>
    <p>Genera cotizaciones de Seguros de Ley y Fianzas</p>
    <div class="cot-tabs">
      <button class="cot-tab active" onclick="showTab('seguros')" id="tab-seguros">🚗 Seguros de Ley</button>
      <button class="cot-tab" onclick="showTab('fianzas')" id="tab-fianzas">🛡️ Fianzas</button>
      <button class="cot-tab" onclick="showTab('historial')" id="tab-historial">📜 Historial</button>
    </div>
  </div>

  <!-- SEGUROS DE LEY - COTIZADOR REACT -->
  <div class="cot-panel active" id="panel-seguros">
    <div id="root-seguros"></div>
  </div>

  <!-- FIANZAS -->
  <div class="cot-panel" id="panel-fianzas">
    <div class="section-card">
      <div class="section-title">🛡️ Nueva Cotización de Fianza</div>
      <div class="fianza-grid">
        <div class="form-group"><label>Nombre del Cliente *</label><input type="text" id="f_nombre" placeholder="Nombre completo"></div>
        <div class="form-group"><label>Cédula / RNC</label><input type="text" id="f_cedula" placeholder="000-0000000-0"></div>
        <div class="form-group"><label>Teléfono</label><input type="tel" id="f_telefono" placeholder="(809) 000-0000"></div>
        <div class="form-group"><label>Correo</label><input type="email" id="f_email" placeholder="correo@email.com"></div>
        <div class="form-group">
          <label>Tipo de Fianza *</label>
          <select id="f_tipo" onchange="calcularFianza()">
            <option value="">Seleccione...</option>
            <option value="judicial">Fianza Judicial (3.0%)</option>
            <option value="contractual">Fianza Contractual (2.5%)</option>
            <option value="aduanal">Fianza Aduanal (2.0%)</option>
            <option value="cumplimiento">Fiel Cumplimiento (2.5%)</option>
            <option value="licitacion">Licitación (1.5%)</option>
            <option value="anticipo">Anticipo (3.5%)</option>
            <option value="garantia">Garantía de Pago (2.0%)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Plazo (meses)</label>
          <select id="f_plazo" onchange="calcularFianza()">
            <option value="1">1 mes</option>
            <option value="3">3 meses</option>
            <option value="6">6 meses</option>
            <option value="12" selected>12 meses</option>
            <option value="18">18 meses</option>
            <option value="24">24 meses</option>
            <option value="36">36 meses</option>
          </select>
        </div>
        <div class="form-group full"><label>Monto Afianzado (DOP) *</label><input type="number" id="f_monto" placeholder="0.00" oninput="calcularFianza()"></div>
        <div class="form-group full"><label>Beneficiario</label><input type="text" id="f_beneficiario" placeholder="Nombre de la entidad"></div>
      </div>
      <div style="margin-top:16px;"><button class="btn-primary" onclick="guardarCotizacion()"><i class="fa-solid fa-save"></i> Guardar y Descargar PDF</button></div>
    </div>
    <div class="result-card">
      <div class="section-title"><i class="fa-solid fa-calculator"></i> Resultado</div>
      <div id="resultado-body"><p style="color:#9ca3af;text-align:center;padding:20px;">Complete el formulario para ver el resultado</p></div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="cot-panel" id="panel-historial">
    <div class="section-card">
      <div class="section-title">📜 Historial de Cotizaciones</div>

      <!-- Toolbar Exportar / Importar -->
      <div class="hist-toolbar">
        <div class="dropdown-export">
          <button class="btn-export-main" onclick="toggleExportMenuHist()">
            <i class="fa-solid fa-file-export"></i> Exportar <i class="fa-solid fa-chevron-down" style="font-size:11px;"></i>
          </button>
          <div class="export-menu" id="exportMenuHist">
            <button onclick="exportarListado('pdf','cotizaciones')"><i class="fa-solid fa-file-pdf" style="color:#e53935;width:18px;"></i> PDF (listado)</button>
            <button onclick="exportarListado('excel','cotizaciones')"><i class="fa-solid fa-file-excel" style="color:#1d6f42;width:18px;"></i> Excel (.xlsx)</button>
            <button onclick="exportarListado('csv','cotizaciones')"><i class="fa-solid fa-file-csv" style="color:#0d9488;width:18px;"></i> CSV</button>
            <button onclick="exportarListado('json','cotizaciones')"><i class="fa-solid fa-code" style="color:#7c3aed;width:18px;"></i> JSON</button>
            <button onclick="exportarListado('zip','cotizaciones')"><i class="fa-solid fa-file-zipper" style="color:#b45309;width:18px;"></i> ZIP</button>
          </div>
        </div>
        <label class="btn-import-main" style="cursor:pointer;">
          <i class="fa-solid fa-file-import"></i> Importar
          <input type="file" accept=".xlsx,.csv" style="display:none;" onchange="importarCotizaciones(event)">
        </label>
        <div class="form-group" style="flex:1; min-width:250px; margin-bottom:0; position:relative;">
          <input type="text" id="hist-search" placeholder="🔍 Buscar por N°, Cliente o Tipo..." oninput="filtrarHistorial()" style="padding:10px 15px; border-radius:10px; border:1.5px solid #e5e7eb; width:100%;">
        </div>
        <span class="hist-count" id="hist-count-label" style="background:#f3f4f6; padding:6px 12px; border-radius:20px; font-weight:600; color:#4b5563;"></span>
      </div>

      <div id="historial-body" style="min-height:200px;">
        <p style="color:#9ca3af;text-align:center;padding:30px;"><i class="fa-solid fa-spinner fa-spin"></i><br>Cargando...</p>
      </div>
    </div>
  </div>

  <script>
    // === TAB SWITCHING ===
    function showTab(name) {
      document.querySelectorAll('.cot-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.cot-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'historial') cargarHistorial();
    }

    // === FORMAT CURRENCY ===
    function fmt(n) { return Number(n).toLocaleString('es-DO', { style: 'currency', currency: 'DOP' }); }

    // === FIANZAS LOGIC ===
    const TASAS = { judicial:0.030, contractual:0.025, aduanal:0.020, cumplimiento:0.025, licitacion:0.015, anticipo:0.035, garantia:0.020 };
    const TIPO_LABELS = { judicial:'Fianza Judicial', contractual:'Fianza Contractual', aduanal:'Fianza Aduanal', cumplimiento:'Fiel Cumplimiento', licitacion:'Licitación', anticipo:'Anticipo', garantia:'Garantía de Pago' };
    
    // Coberturas por tipo de fianza
    const FIANZA_COBERTURAS = {
      judicial: [
        { label: 'Fianza Judicial de Appearance', amount: 50000 },
        { label: 'Fianza Judicial de Payment', amount: 50000 },
        { label: 'Garantía de Caución', amount: 50000 }
      ],
      contractual: [
        { label: 'Cumplimiento de Contrato', amount: 100000 },
        { label: 'Buena Calidad', amount: 75000 },
        { label: 'Anticipo', amount: 50000 }
      ],
      aduanal: [
        { label: 'Garantía Aduanera', amount: 100000 },
        { label: 'Devolución de Garantía', amount: 75000 },
        { label: 'Garantía de Pago', amount: 50000 }
      ],
      cumplimiento: [
        { label: 'Fiel Cumplimiento', amount: 150000 },
        { label: 'Buena Ejecución', amount: 100000 },
        { label: 'Garantía de Mantenimiento', amount: 50000 }
      ],
      licitacion: [
        { label: 'Seriedad de Oferta', amount: 50000 },
        { label: 'Fianza de Mantenimiento de Oferta', amount: 75000 },
        { label: 'Garantía de Suspensión', amount: 50000 }
      ],
      anticipo: [
        { label: 'Reembolso de Anticipo', amount: 100000 },
        { label: 'Correcta Inversión del Anticipo', amount: 75000 },
        { label: 'Garantía de Anticipo', amount: 50000 }
      ],
      garantia: [
        { label: 'Garantía de Pago', amount: 100000 },
        { label: 'Garantía de Proveedor', amount: 75000 },
        { label: 'Aval Financiero', amount: 50000 }
      ]
    };

    function calcularFianza() {
      const tipo = document.getElementById('f_tipo').value;
      const monto = parseFloat(document.getElementById('f_monto').value) || 0;
      const plazo = parseInt(document.getElementById('f_plazo').value) || 12;
      const body = document.getElementById('resultado-body');

      if (!tipo || monto <= 0) {
        body.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:20px;">Seleccione tipo e ingrese monto</p>';
        return;
      }

      const tasa = TASAS[tipo];
      const prima = monto * tasa * (plazo / 12);
      const impuesto = prima * 0.18;
      const total = prima + impuesto;
      const numCot = window._editingFianzaNum || ('F-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 9000 + 1000));
      
      // Mostrar coberturas
      const coberturas = FIANZA_COBERTURAS[tipo] || [];
      let coberturaHTML = '';
      if (coberturas.length > 0) {
        coberturaHTML = '<div style="margin-top:16px;padding-top:16px;border-top:1px solid #e0e7ff;"><div style="font-size:13px;font-weight:600;color:#4338ca;margin-bottom:10px;">Coberturas Incluidas:</div>';
        coberturas.forEach(c => {
          coberturaHTML += '<div class="result-row"><span class="label">' + c.label + '</span><span class="value">' + fmt(c.amount) + '</span></div>';
        });
        coberturaHTML += '</div>';
      }

      body.innerHTML = '<div class="result-row"><span class="label">N° Cotización</span><span class="value">' + numCot + '</span></div>' +
        '<div class="result-row"><span class="label">Tipo</span><span class="value">' + TIPO_LABELS[tipo] + '</span></div>' +
        '<div class="result-row"><span class="label">Monto</span><span class="value">' + fmt(monto) + '</span></div>' +
        '<div class="result-row"><span class="label">Plazo</span><span class="value">' + plazo + ' meses</span></div>' +
        '<div class="result-row"><span class="label">Prima</span><span class="value">' + fmt(prima) + '</span></div>' +
        '<div class="result-row"><span class="label">ITBIS (18%)</span><span class="value">' + fmt(impuesto) + '</span></div>' +
        coberturaHTML +
        '<div class="result-row" style="border-top:2px solid #c7d2fe;margin-top:8px;padding-top:12px;"><span class="label" style="font-weight:600;">Total</span><span class="amount">' + fmt(total) + '</span></div>';

      window.currentCot = { 
        numero: numCot, 
        tipo: TIPO_LABELS[tipo], 
        monto, plazo, prima, impuesto, total, coberturas: coberturas 
      };
    }

    async function guardarCotizacion() {
      const nombre = document.getElementById('f_nombre').value.trim();
      const cedula = document.getElementById('f_cedula').value.trim();
      const telefono = document.getElementById('f_telefono').value.trim();
      const email = document.getElementById('f_email').value.trim();
      const tipo = document.getElementById('f_tipo').value;
      const monto = parseFloat(document.getElementById('f_monto').value) || 0;

      if (!nombre || !tipo || monto <= 0) {
        alert('Complete: Nombre, Tipo de fianza y Monto');
        return;
      }

      if (!window.currentCot) calcularFianza();
      const cot = window.currentCot;

      // Parsear coberturas si son string
      let coberturasArr = cot.coberturas || [];
      if (typeof coberturasArr === 'string') { try { coberturasArr = JSON.parse(coberturasArr); } catch(e) { coberturasArr = []; } }

      const data = {
        tipo: 'FIANZA',
        subtipo: cot.tipo,
        numero: cot.numero,
        cliente: nombre,
        cedula: cedula,
        telefono: telefono,
        email: email,
        monto_afianzado: monto,
        plazo: cot.plazo,
        prima_base: cot.prima,
        impuesto: cot.impuesto,
        total: cot.total,
        cobertura: JSON.stringify(coberturasArr),
        tasa: TASAS[tipo],
        fecha: new Date().toISOString()
      };

      const action = window._editingFianzaId ? 'actualizar' : 'guardar';
      if (window._editingFianzaId) data.id = window._editingFianzaId;

      try {
        const res = await fetch(`/PLATAFORMA_INTEGRADA/backend/api/cotizaciones.php?action=${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        }).then(r => r.json());

        if (res.exito) {
          console.log("Guardado exitoso:", res);
          localToast(window._editingFianzaId ? '✅ Fianza actualizada correctamente' : '✅ Cotización guardada: ' + cot.numero, 'success');
          
          // Presentar PDF
          generarPDFFianzaProfesional(data);
          
          window._editingFianzaId = null;
          window._editingFianzaNum = null;
          
          // Recargar historial después de un breve delay
          setTimeout(() => {
            cargarHistorial();
            showTab('historial');
          }, 1000);
        } else {
          console.error("Error API:", res);
          alert('Error al guardar: ' + (res.mensaje || 'Respuesta inválida del servidor'));
        }
      } catch (e) {
        console.error("Error de conexión:", e);
        alert('Error de conexión con el servidor: ' + e.message);
      }
    }

    // Helper para feedback visual (si no existe mostrarToast, usar alert)
    function localToast(msg, type) {
      // Intentar llamar a la función del dashboard padre si existe, 
      // verificando que NO sea esta misma función local para evitar recursión.
      if (window.parent && typeof window.parent.mostrarToast === 'function') {
        window.parent.mostrarToast(msg, type);
      } else {
        alert(msg);
      }
    }

    function generarPDFFianzaProfesional(data) {
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        // Normalizar datos para dibujarCotizacionPDF (nombre del campo coberturas → cobertura string)
        const dataNorm = Object.assign({}, data);
        if (Array.isArray(dataNorm.cobertura)) { dataNorm.cobertura = ''; }
        // Llamar al motor profesional con logo MQF en Base64
        if (typeof dibujarCotizacionPDF === 'function') {
          dibujarCotizacionPDF(doc, dataNorm, window.LOGO_MQF_B64 || null, null);
        } else {
          console.error('dibujarCotizacionPDF no disponible — verifica data-export.js');
          doc.text('Sin motor PDF', 14, 20);
        }
      } catch (e) { console.error('PDF Error:', e); }
    }

    function cargarHistorial() {
      const body = document.getElementById('historial-body');
      body.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:30px;"><i class="fa-solid fa-spinner fa-spin"></i><br>Cargando...</p>';

      fetch('/PLATAFORMA_INTEGRADA/backend/api/cotizaciones.php?action=listar')
        .then(r => r.json())
        .then(res => {
          if (res.exito && res.datos && res.datos.length > 0) {
            // Guardar en variable global para exportarListado()
            window.cotizacionesData = res.datos;
            const countLabel = document.getElementById('hist-count-label');
            if (countLabel) countLabel.textContent = res.datos.length + ' cotizaciones registradas';

            renderizarTablaHistorial(window.cotizacionesData);
          } else {
            window.cotizacionesData = [];
            body.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:30px;">No hay cotizaciones guardadas aún.</p>';
          }
        })
        .catch(e => {
          body.innerHTML = '<p style="color:red;text-align:center;padding:30px;">Error al cargar historial: ' + e.message + '</p>';
        });
    }

    function filtrarHistorial() {
      const input = document.getElementById('hist-search');
      if (!input) return;
      // Limpiar espacios, guiones especiales y caracteres invisibles
      const query = input.value.toLowerCase().trim().replace(/[\u200B-\u200D\uFEFF]/g, "").replace(/–|—/g, "-");
      const body = document.getElementById('historial-body');
      
      if (!window.cotizacionesData || window.cotizacionesData.length === 0) return;

      if (query === "") {
        renderizarTablaHistorial(window.cotizacionesData);
        return;
      }

      const filtered = window.cotizacionesData.filter(c => {
        // Búsqueda global definitiva: convierte todo el registro a texto y busca coincidencias
        // Esto ignora nombres de campos y detecta valores en cualquier propiedad
        try {
          return JSON.stringify(c).toLowerCase().includes(query);
        } catch (e) {
          // Fallback por si hay referencias circulares (poco probable aquí)
          return Object.values(c).join(" ").toLowerCase().includes(query);
        }
      });

      if (filtered.length === 0) {
        body.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:30px;">No se encontraron coincidencias para "<strong>' + input.value + '</strong>".</p>';
        return;
      }

      renderizarTablaHistorial(filtered);
    }

    function renderizarTablaHistorial(datos) {
      const body = document.getElementById('historial-body');
      let html = '<table><thead><tr>' +
        '<th>N°</th><th>Tipo</th><th>Cliente</th>' +
        '<th style="text-align:right;">Total</th>' +
        '<th>Fecha</th>' +
        '<th style="text-align:center;">Acciones</th>' +
        '</tr></thead><tbody>';

      datos.forEach((c) => {
        // Pasar el ID como string entre comillas para evitar errores de evaluación
        const qId = c.id;
        const htmlFila = '<tr>' +
          '<td><strong>' + (c.numero || '-') + '</strong></td>' +

    function editarCotizacion(id) {
      console.log("Iniciando edición para ID:", id);
      if (!window.cotizacionesData) { console.error("No hay datos cargados"); return; }
      
      const c = window.cotizacionesData.find(item => String(item.id) === String(id));
      if (!c) {

        alert('No se encontró la cotización ID: ' + id); return;
      }
      console.log("Registro encontrado:", c);

      const esSeguro = (c.tipo || '').toUpperCase().includes('SEGURO') || 
                       (c.numero || '').toUpperCase().startsWith('SL-') ||
                       (c.subtipo || '').toUpperCase().includes('AUTOMOVIL');

      if (esSeguro) {
        window.dispatchEvent(new CustomEvent('edit-cotizacion', { detail: c }));
        showTab('seguros');

        document.getElementById('f_nombre').value = c.cliente || '';
        document.getElementById('f_cedula').value = c.cedula || '';
        document.getElementById('f_telefono').value = c.telefono || '';

        document.getElementById('f_monto').value = c.monto_afianzado || 0;

          return;
        }

        const isEdit = !!editingId;
        const numCot = isEdit ? editingNum : ('SL-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 9000 + 1000));
        
        const data = {
          tipo: 'SEGURO DE LEY',
          subtipo: type,
          numero: numCot,
          cliente: cliente,
          cedula: cedula,
          uso: uso,
          capacidad: capacidad,
          aseguradora: insurer,
          cobertura: selectedCoverage,
          plazo: 0,
          prima_base: price,
          servicios_opcionales: JSON.stringify(optionalSelected),
          prima_mensual: 0,
          impuesto: 0,
          total: totalPrice,
          fecha: new Date().toISOString()
        };
        
        if (isEdit) data.id = editingId;
        const action = isEdit ? 'actualizar' : 'guardar';
        
        fetch('/PLATAFORMA_INTEGRADA/backend/api/cotizaciones.php?action=' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        }).then(r=>r.json()).then(res=>{
          if(res.exito){
            alert('Cotización ' + (isEdit ? 'actualizada' : 'guardada') + ': ' + numCot);
            generarPDFSeguroProfesional(data);
            setEditingId(null);
            setEditingNum(null);
            window.parent.postMessage({ type: 'cotizacion-guardada', data: data }, '*');
          } else {
            alert('Error: ' + res.mensaje);
          }
        }).catch(e=> alert('Error: ' + e.message));
      }

      function generarPDFSeguroProfesional(data) {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          // Asegurar que servicios_opcionales sea objeto (no string) para dibujarCotizacionPDF
          const dataNorm = Object.assign({}, data);
          if (typeof dataNorm.servicios_opcionales === 'string') {
            try { dataNorm.servicios_opcionales = JSON.parse(dataNorm.servicios_opcionales); } catch(e) { dataNorm.servicios_opcionales = {}; }
          }
          // Llamar al motor profesional con logo MQF en Base64
          if (typeof dibujarCotizacionPDF === 'function') {
            dibujarCotizacionPDF(doc, dataNorm, window.LOGO_MQF_B64 || null, null);
          } else {
            console.error('dibujarCotizacionPDF no disponible — verifica data-export.js');
            doc.text('Sin motor PDF', 14, 20);
            const blob = doc.output('blob');
            window.open(URL.createObjectURL(blob), '_blank');
          }
        } catch(e){ console.error('PDF Error:', e); }
      }

      return (
        <div className="max-w-4xl mx-auto">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-1">
              <div className="px-4 py-3 bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-lg shadow">
                <h1 className="text-xl font-bold">SEGUROS DE LEY</h1>
                <p className="text-sm opacity-90">Cotizador rápido MULTISEGUROS</p>
              </div>
              <form className="mt-6 space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700">Tipo de Vehículo</label>
                  <select value={type} onChange={e=>setType(e.target.value)} className="mt-1 w-full p-3 border rounded">
                    <option value="">Seleccione Tipo...</option>
                    {tipos.map(t=> <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700">Uso</label>
                  <select value={uso} onChange={e=>setUso(e.target.value)} disabled={!type} className="mt-1 w-full p-3 border rounded">
                    <option value="">Seleccione Uso...</option>
                    {usos.map(u=> <option key={u} value={u}>{u}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700">Capacidad / Cilindrada</label>
                  <select value={capacidad} onChange={e=>setCapacidad(e.target.value)} disabled={!uso} className="mt-1 w-full p-3 border rounded">
                    <option value="">Seleccione Capacidad...</option>
                    {capacidades.map(c=> <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </form>
            </div>
            <div className="md:col-span-2 p-4">
              <div className="bg-gray-50 p-4 rounded">
                <h2 className="text-lg font-semibold">Resultados</h2>

                {selectedCoverage && (
                  <div className="mt-4 p-3 border rounded bg-white">
                    <div className="flex items-center justify-between">
                      <div className="font-semibold">Cobertura: {selectedCoverage}</div>
                      <div className="flex items-center gap-3">
                        <div className="text-sm text-gray-500">Incluida</div>
                        <button onClick={()=>setShowCoverageDetails(s=>!s)} className="px-2 py-1 text-sm border rounded hover:bg-gray-100">{showCoverageDetails? 'Ocultar detalles' : 'Ver detalles'}</button>
                      </div>
                    </div>
                    {showCoverageDetails && (
                      <div className="mt-3 space-y-2">
                        {(COVERAGE_PROFILES[String(selectedCoverage).trim()]||[]).map((c,idx)=> (
                          <div key={idx} className="flex justify-between text-sm">
                            <div>{c.label}</div>
                            <div className="font-medium">{currency(c.amount)}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* Servicios Opcionales */}
                {selectedCoverage && (
                  <div className="mt-4">
                    <label className="block text-sm font-medium text-gray-700">Servicios Opcionales</label>
                    <div className="mt-2 space-y-2">
                      {OPTIONAL_SERVICES.map(s=>{
                        if(selectedCoverage && selectedCoverage.includes('LIVIANO') && s.id === 'ASIST_VIAL_PES') return null;
                        if(selectedCoverage && selectedCoverage.includes('PESADO') && s.id === 'ASIST_VIAL_LIV') return null;
                        const disabled = (s.id === 'CENTRO_AUTOMOVILISTA' && optionalSelected.CASA_CONDUCTOR) || (s.id === 'CASA_CONDUCTOR' && optionalSelected.CENTRO_AUTOMOVILISTA);
                        return (
                          <label key={s.id} className={`flex items-center justify-between p-2 border rounded ${optionalSelected[s.id]?'bg-gray-50':''}`}>
                            <div className="flex items-center">
                              <input type="checkbox" disabled={disabled} checked={!!optionalSelected[s.id]} onChange={e=> setOptionalSelected(prev=>({ ...prev, [s.id]: e.target.checked }))} className="mr-3" />
                              <div className="text-sm">{s.label}</div>
                            </div>
                            <div className="text-sm text-gray-600">—</div>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                )}

                <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div className="p-3 border rounded">
                    <div className="text-sm text-gray-500">Aseguradora</div>
                    <div className="font-bold mt-1">{insurer || '—'}</div>
                  </div>
                  <div className="p-3 border rounded">
                    <div className="text-sm text-gray-500">Precio estimado</div>
                    <div className="font-bold text-green-600 mt-1">{currency(totalPrice || 0)}</div>
                  </div>
                </div>

                {/* Otras aseguradoras */}
                <div className="mt-4">
                  <div className="text-sm text-gray-600">Otras aseguradoras disponibles</div>
                  <div className="mt-2 space-y-2">
                    {insurersList.length ? insurersList.map(i=> (
                      <label key={i.aseguradora} className={`flex items-center justify-between p-2 border rounded ${insurer===i.aseguradora?'ring-2 ring-cyan-300':''}`}>
                        <div className="flex items-center">
                          <input type="radio" name="insurer" value={i.aseguradora} checked={insurer===i.aseguradora} onChange={()=>{ setInsurer(i.aseguradora); setPrice(i.prima); setErrors(prev=>{ const n={...prev}; delete n.insurer; delete n.price; return n; }); }} className="mr-3" />
                          <div>{i.aseguradora}</div>
                        </div>
                        <div className="font-semibold">{currency(i.prima)}</div>
                      </label>
                    )) : (
                      <div className="text-sm text-gray-500">No hay tarifas disponibles para la selección.</div>
                    )}
                  </div>
                  {errors.insurer && <div className="mt-2 text-sm text-red-600">{errors.insurer}</div>}
                </div>

                <div className="mt-6 flex gap-3">
                  <button onClick={()=>{
                    if(!validate()) return;
                    const q = { 
                      id: editingId,
                      tipo: 'SEGURO DE LEY', 
                      subtipo: type,
                      numero: editingNum,
                      uso: uso, 
                      capacidad: capacidad, 
                      aseguradora: insurer, 
                      prima_base: price, 
                      cobertura: selectedCoverage, 
                      servicios_opcionales: optionalSelected, 
                      total: totalPrice 
                    };
                    
                    const action = editingId ? 'actualizar' : 'guardar';
                    
                    fetch(`/PLATAFORMA_INTEGRADA/backend/api/cotizaciones.php?action=${action}`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify(q)
                    }).then(r=>r.json()).then(res=>{
                      if(res.exito){
                        alert(editingId ? 'Cotización actualizada' : 'Cotización guardada');
                        generarPDFSeguroProfesional(Object.assign({}, q, { numero: editingNum || res.numero || 'EDIT' }));
                        setEditingId(null);
                        setEditingNum(null);
                        cargarHistorial();
                      } else {
                        alert('Error: ' + res.mensaje);
                      }
                    }).catch(e=> alert('Error: ' + e.message));
                  }} className="px-4 py-2 bg-green-600 text-white rounded disabled:opacity-50">
                    {editingId ? 'Guardar Cambios' : 'Guardar y Descargar PDF'}
                  </button>
                  <button onClick={()=>{ 
                    setEditingId(null);
                    setEditingNum(null);
                    setType(''); setUso(''); setCapacidad(''); setInsurer(''); setPrice(0); setErrors({}); setSelectedCoverage(''); setOptionalSelected({}); 
                  }} className="px-4 py-2 border rounded">
                    {editingId ? 'Cancelar Edición' : 'Restablecer'}
                  </button>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root-seguros')).render(<App />);
  </script>
</body>
</html>
