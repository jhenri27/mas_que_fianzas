<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .result { background: #f0f0f0; padding: 20px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Test API Endpoint</h1>
    
    <button onclick="testLogin()">Test Login API</button>
    <button onclick="testSimple()">Test Simple GET</button>
    
    <div id="result" class="result"></div>

    <script>
        async function testSimple() {
            try {
                const response = await fetch('http://localhost/PLATAFORMA_INTEGRADA/backend/api/test-api.php');
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }

        async function testLogin() {
            try {
                const response = await fetch('http://localhost/PLATAFORMA_INTEGRADA/backend/api/test-api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'Demo@123' })
                });
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
